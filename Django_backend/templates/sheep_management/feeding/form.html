{% extends 'sheep_management/base.html' %}

{% block content %}
<div class="card">
    <h2>{{ title }}</h2>
    <form method="post" style="margin-top: 20px;">
        {% csrf_token %}
        <div class="form-group">
            <label>羊只 *</label>
            <select name="sheep_id" required>
                <option value="">请选择羊只</option>
                {% for sheep in sheep_list %}
                <option value="{{ sheep.id }}">#{{ sheep.id }} - {{ sheep.gender }} - {{ sheep.weight }}kg</option>
                {% endfor %}
            </select>
        </div>
        <div class="form-group">
            <label>饲料类型 *</label>
            <input type="text" name="feed_type" required placeholder="如：青草、精饲料等">
        </div>
        <div class="form-group">
            <label>喂养日期 *</label>
            <input type="date" name="feed_date" required>
        </div>
        <div class="form-group">
            <label>数量 *</label>
            <input type="number" name="amount" step="0.1" required>
        </div>
        <div class="form-group">
            <label>单位 *</label>
            <select name="unit" required>
                <option value="kg" selected>kg（千克）</option>
                <option value="g">g（克）</option>
                <option value="捆">捆</option>
                <option value="捐">捐</option>
                <option value="覆">覆</option>
                <option value="包">包</option>
                <option value="L">L（升）</option>
                <option value="mL">mL（毫升）</option>
            </select>
        </div>
        <div style="display: flex; gap: 10px;">
            <button type="submit" class="btn">保存</button>
            <a href="{% url 'feeding_record_list' %}" class="btn" style="background: #95a5a6;">取消</a>
        </div>
    </form>
</div>
{% endblock %}
