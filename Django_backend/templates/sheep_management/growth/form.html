{% extends 'sheep_management/base.html' %}

{% block content %}
<div class="card">
    <h2>{{ title }}</h2>
    <form method="post" style="margin-top: 20px;">
        {% csrf_token %}
        <div class="form-group">
            <label>羊只 *</label>
            <select name="sheep_id" required>
                <option value="">请选择羊只</option>
                {% for sheep in sheep_list %}
                <option value="{{ sheep.id }}">#{{ sheep.id }} - {{ sheep.gender }} - {{ sheep.weight }}kg</option>
                {% endfor %}
            </select>
        </div>
        <div class="form-group">
            <label>记录日期 *</label>
            <input type="date" name="record_date" required>
        </div>
        <div class="form-group">
            <label>体重(kg) *</label>
            <input type="number" name="weight" step="0.1" required>
        </div>
        <div class="form-group">
            <label>身高(cm) *</label>
            <input type="number" name="height" step="0.1" required>
        </div>
        <div class="form-group">
            <label>体长(cm) *</label>
            <input type="number" name="length" step="0.1" required>
        </div>
        <div style="display: flex; gap: 10px;">
            <button type="submit" class="btn">保存</button>
            <a href="{% url 'growth_record_list' %}" class="btn" style="background: #95a5a6;">取消</a>
        </div>
    </form>
</div>
{% endblock %}
