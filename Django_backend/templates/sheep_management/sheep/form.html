{% extends 'sheep_management/base.html' %}

{% block content %}
<div class="card">
    <h2>{{ title }}</h2>
    <form method="post" style="margin-top: 20px;">
        {% csrf_token %}
        <div class="form-group">
            <label>性别 *</label>
            <select name="gender" required>
                <option value="">请选择</option>
                <option value="公" {% if sheep.gender == '公' %}selected{% endif %}>公</option>
                <option value="母" {% if sheep.gender == '母' %}selected{% endif %}>母</option>
                <option value="雄性" {% if sheep.gender == '雄性' %}selected{% endif %}>雄性</option>
                <option value="雌性" {% if sheep.gender == '雌性' %}selected{% endif %}>雌性</option>
            </select>
        </div>
        <div class="form-group">
            <label>体重(kg) *</label>
            <input type="number" name="weight" step="0.1" required value="{% if sheep %}{{ sheep.weight }}{% endif %}">
        </div>
        <div class="form-group">
            <label>身高(cm) *</label>
            <input type="number" name="height" step="0.1" required value="{% if sheep %}{{ sheep.height }}{% endif %}">
        </div>
        <div class="form-group">
            <label>体长(cm) *</label>
            <input type="number" name="length" step="0.1" required value="{% if sheep %}{{ sheep.length }}{% endif %}">
        </div>
        <div style="display: flex; gap: 10px;">
            <button type="submit" class="btn">保存</button>
            <a href="{% url 'sheep_list' %}" class="btn" style="background: #95a5a6;">取消</a>
        </div>
    </form>
</div>
{% endblock %}
