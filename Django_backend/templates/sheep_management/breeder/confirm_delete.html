{% extends 'sheep_management/base.html' %}

{% block content %}
<div class="card">
    <h2>确认删除</h2>
    <p style="margin: 20px 0;">确定要删除养殖户 {{ breeder.name }} ({{ breeder.phone }}) 吗？</p>
    <p style="color: #e74c3c; margin-bottom: 20px;">此操作不可恢复！</p>
    <form method="post">
        {% csrf_token %}
        <div style="display: flex; gap: 10px;">
            <button type="submit" class="btn btn-danger">确认删除</button>
            <a href="{% url 'breeder_list' %}" class="btn" style="background: #95a5a6;">取消</a>
        </div>
    </form>
</div>
{% endblock %}
