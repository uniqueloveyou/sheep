{% extends 'sheep_management/base.html' %}

{% block content %}
<div class="card">
    <h2>{{ title }}</h2>
    <form method="post" style="margin-top: 20px;">
        {% csrf_token %}
        <div class="form-group">
            <label>姓名 *</label>
            <input type="text" name="name" required value="{% if breeder %}{{ breeder.name }}{% endif %}">
        </div>
        <div class="form-group">
            <label>性别 *</label>
            <select name="gender" required>
                <option value="">请选择</option>
                <option value="男" {% if breeder.gender == '男' %}selected{% endif %}>男</option>
                <option value="女" {% if breeder.gender == '女' %}selected{% endif %}>女</option>
            </select>
        </div>
        <div class="form-group">
            <label>联系电话 *</label>
            <input type="text" name="phone" required value="{% if breeder %}{{ breeder.phone }}{% endif %}">
        </div>
        <div class="form-group">
            <label>羊只总数 *</label>
            <input type="number" name="sheep_count" required value="{% if breeder %}{{ breeder.sheep_count }}{% endif %}">
        </div>
        <div class="form-group">
            <label>羊只编号 *</label>
            <input type="text" name="sheep_id" required value="{% if breeder %}{{ breeder.sheep_id }}{% endif %}">
        </div>
        <div class="form-group">
            <label>母羊数量 *</label>
            <input type="number" name="female_count" required value="{% if breeder %}{{ breeder.female_count }}{% endif %}">
        </div>
        <div class="form-group">
            <label>公羊数量 *</label>
            <input type="number" name="male_count" required value="{% if breeder %}{{ breeder.male_count }}{% endif %}">
        </div>
        <div style="display: flex; gap: 10px;">
            <button type="submit" class="btn">保存</button>
            <a href="{% url 'breeder_list' %}" class="btn" style="background: #95a5a6;">取消</a>
        </div>
    </form>
</div>
{% endblock %}
