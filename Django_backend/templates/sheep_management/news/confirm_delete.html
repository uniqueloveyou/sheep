{% extends 'sheep_management/base.html' %}

{% block title %}删除资讯 - 羊只管理后台{% endblock %}
{% block page_title %}删除资讯{% endblock %}

{% block content %}
<div class="card" style="max-width:720px;">
    <p>确认删除资讯《{{ item.title }}》吗？</p>
    <form method="post" style="margin-top:16px;display:flex;gap:10px;">
        {% csrf_token %}
        <button type="submit" class="btn btn-danger">确认删除</button>
        <a href="{% url 'news_list' %}" class="btn">取消</a>
    </form>
</div>
{% endblock %}
